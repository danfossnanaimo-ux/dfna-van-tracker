<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>DFNA Vehicle Map</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  #controls {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: rgba(255, 255, 255, 0.95);
    padding: 12px;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    width: 320px; /* 2x wider */
  }

  #vehicleSearch,
  #vehicleDropdown {
    width: 100%;
    padding: 12px;       /* bigger touch target */
    font-size: 28px;     /* 200% larger text */
    box-sizing: border-box;
    margin-bottom: 12px;
  }
</style>
</head>

<body>

<div id="controls">
  <input type="text" id="vehicleSearch" placeholder="Search vehicle...">
  <select id="vehicleDropdown"></select>
</div>

<div id="map"></div>

<!-- IMPORTANT: Leaflet BEFORE app.js -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="assets/js/app.js" defer></script>

</body>
</html>
