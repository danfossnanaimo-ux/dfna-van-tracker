<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DFNA Van Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        font-family: system-ui, sans-serif;
    }

    #map {
        width: 100%;
        height: 100%;
    }

    #topBar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        background: rgba(0,0,0,0.85);
        color: white;
        padding: 10px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 16px;
        z-index: 9999;
        box-sizing: border-box;
    }

    #leftControls {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    #vanInfo {
        font-weight: 600;
    }

    #vehicleDropdown {
        background: #333;
        color: white;
        border: 1px solid #555;
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
    }

    #userInfo {
        opacity: 0.8;
        font-size: 14px;
    }

    #actions {
        display: flex;
        gap: 8px;
    }

    #actions button {
        padding: 6px 12px;
        background: #1e88e5;
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
    }

    #actions button:hover {
        background: #1565c0;
    }

    #resetButton {
        background: #e53935 !important;
    }
    #resetButton:hover {
        background: #c62828 !important;
    }
    #navButton {
        background: #43a047 !important;
    }
    #navButton:hover {
        background: #2e7d32 !important;
    }
</style>
</head>

<body>

<div id="topBar">
    <div id="leftControls">
        <div id="vanInfo">Tracking Van —</div>
        <select id="vehicleDropdown">
            <option value="__show_all__">📱 Show All Vehicles</option>
        </select>
    </div>
    
    <div id="userInfo"></div>
    
    <div id="actions">
        <button id="navButton" style="display: none;">Navigate</button>
        <button id="resetButton" style="display: none;">Reset View</button>
        <button onclick="changeVan()">Change Van</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="assets/js/app.js" defer></script>

<script>
    // Load session
    const session = JSON.parse(localStorage.getItem("dfnaSession") || "{}");

    if (!session.user || !session.numericVan) {
        // No session → send back to login
        window.location.href = "login.html";
    }

    const vanNumber = session.numericVan;
    const user = session.user;

    // Update UI Header Content
    document.getElementById("vanInfo").textContent = `Tracking Van ${vanNumber}`;
    document.getElementById("userInfo").textContent = `${user.name} — ${user.division}`;

    // Inline global handlers for baseline tracking navigation
    function changeVan() {
        localStorage.removeItem("dfnaSession");
        window.location.href = "login.html";
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>

</body>
</html>
