<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFNA Van Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background: #f0f0f0; 
            font-family: Arial, sans-serif; 
        }
        #map { 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }
        
        /* Dropdown Control Panel Styling Overlay */
        .control-panel {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 9999;
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        select {
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            cursor: pointer;
            font-weight: 500;
        }
        .ui-btn { 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            border: 1px solid #ccc; 
            background: #fff; 
            font-size: 18px; 
            cursor: pointer; 
            box-shadow: 0 1px 4px rgba(0,0,0,0.15); 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .ui-btn:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <select id="vehicleDropdown">
            <option value="__show_all__">📱 Show All Vehicles</option>
        </select>
        
        <button id="resetButton" class="ui-btn" title="Reset View / Show All">🔄</button>
        
        <button id="navButton" class="ui-btn" title="Open External Directions Map">🧭</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
