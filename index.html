<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFNA Van Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background: #f0f0f0; 
            font-family: Arial, sans-serif; 
        }
        #map { 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }
        
        /* Dropdown Control Styling Overlay */
        .control-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 9999;
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        select {
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
            outline: none;
            cursor: pointer;
        }
        #navButton { 
            width: 34px; 
            height: 34px; 
            border-radius: 50%; 
            border: none; 
            background: #fff; 
            font-size: 18px; 
            cursor: pointer; 
            box-shadow: 0 1px 4px rgba(0,0,0,0.2); 
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <select id="vehicleDropdown">
            <option value="__show_all__">📱 Show All Vehicles</option>
        </select>
        <button id="navButton" onclick="typeof openNavigation === 'function' && openNavigation()">🧭</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
