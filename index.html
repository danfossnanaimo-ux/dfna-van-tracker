<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>DFNA Vehicle Map</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- App Styles -->
<link rel="stylesheet" href="assets/css/styles.css">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

<!-- App JS (loads Google Drive data + map logic) -->
<script src="assets/js/app.js" defer></script>

<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
  }
  #map {
    width: 100%;
    height: 100%;
  }

  .user-pulse {
    position: relative;
  }

  .user-pulse::after {
    content: "";
    position: absolute;
    width: 40px;
    height: 40px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 150, 255, 0.4);
    border-radius: 50%;
    animation: pulse 1.8s ease-out infinite;
  }

  @keyframes pulse {
    0% {
      transform: translate(-50%, -50%) scale(0.3);
      opacity: 0.8;
    }
    100% {
      transform: translate(-50%, -50%) scale(1.8);
      opacity: 0;
    }
  }

  .vehicle-label {
    background: white;
    padding: 2px 4px;
    border-radius: 3px;
    font-size: 12px;
    border: 1px solid #333;
  }

  #controls {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: rgba(255, 255, 255, 0.9);
    padding: 6px;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    width: 160px;
  }

  #vehicleSearch, #vehicleDropdown {
    width: 100%;
    padding: 4px;
    font-size: 14px;
    box-sizing: border-box;
    margin-bottom: 6px;
  }
</style>
</head>

<body>

<!-- Search + Dropdown Controls -->
<div id="controls">
  <input type="text" id="vehicleSearch" placeholder="Search vehicle...">
  <select id="vehicleDropdown"></select>
</div>

<!-- Map Container -->
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</body>
</html>
