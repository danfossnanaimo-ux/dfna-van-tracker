<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DFNA Van Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        font-family: system-ui, sans-serif;
    }

    #map {
        width: 100%;
        height: 100%;
    }

    #topBar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        background: rgba(0,0,0,0.75);
        color: white;
        padding: 10px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 18px;
        z-index: 9999;
    }

    #vanInfo {
        font-weight: 600;
    }

    #userInfo {
        opacity: 0.8;
    }

    #actions button {
        margin-left: 10px;
        padding: 6px 12px;
        background: #1e88e5;
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font-size: 14px;
    }
</style>
</head>

<body>

<div id="topBar">
    <div id="vanInfo">Tracking Van —</div>
    <div id="userInfo"></div>
    <div id="actions">
        <button onclick="changeVan()">Change Van</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

<script>
    // Load session
    const session = JSON.parse(localStorage.getItem("dfnaSession") || "{}");

    if (!session.user || !session.numericVan) {
        // No session → send back to login
        window.location.href = "login.html";
    }

    const vanNumber = session.numericVan;
    const user = session.user;

    // Update UI
    document.getElementById("vanInfo").textContent = `Tracking Van ${vanNumber}`;
    document.getElementById("userInfo").textContent = `${user.name} — ${user.division}`;

    // Auto-load van once map
