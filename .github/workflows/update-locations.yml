name: Update DFNA Van Locations

on:
  schedule:
    - cron: "59 6 * * *"   # 23:59 Pacific Time = 06:59 UTC
  workflow_dispatch:        # allows manual run

jobs:
  update-locations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Run DFNA van tracker script
        env:
          GEOTAB_PASSWORD: ${{ secrets.GEOTAB_PASSWORD }}
        run: |
          python dfna-van-tracker.py

      - name: Commit and push updated locations.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/locations.json
          git commit -m "Automated update of van locations" || echo "No changes to commit"
          git push

